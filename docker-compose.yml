version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: whaticket-frontend
    container_name: whaticket-frontend
    ports:
      - "3333:80" # Acede ao frontend na porta 3333 (pode mudar para 80:80 se preferir)
    environment:
      - REACT_APP_BACKEND_URL=${BACKEND_URL:-http://localhost:8080}
    depends_on:
      - backend
    networks:
      - whaticket-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: whaticket-backend
    container_name: whaticket-backend
    ports:
      - "8080:8080" 
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - whaticket-network
    restart: always
    volumes:
      - ./backend/public:/app/public
    command: sh -c "dockerize -wait tcp://db:5432 -timeout 60s && npx sequelize db:migrate && npx sequelize db:seed:all || true && npm start"

  db:
    image: postgres:14-alpine
    container_name: whaticket-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=senha
      - POSTGRES_DB=db_name
    ports:
      - "5432:5432"
    volumes:
      - whaticket-db-data:/var/lib/postgresql/data
    networks:
      - whaticket-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db_name"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: whaticket-redis
    command: redis-server --requirepass 123456 # Senha configurada no seu .env
    ports:
      - "6379:6379"
    volumes:
      - whaticket-redis-data:/data
    networks:
      - whaticket-network
    restart: always

networks:
  whaticket-network:
    driver: bridge

volumes:
  whaticket-db-data:
  whaticket-redis-data: